<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audify – Offline</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020617;
        color: #e5e7eb;
      }
      .card {
        padding: 1.5rem 1.75rem;
        border-radius: 1.25rem;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: radial-gradient(circle at top left, #4f46e5, transparent 60%), #020617;
        max-width: 420px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
      }
      h1 {
        font-size: 1.1rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 0.25rem;
        font-size: 0.85rem;
        color: #cbd5f5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You're offline</h1>
      <p>Audify couldn't load for the first time without a network connection.</p>
      <p>
        Reconnect to the internet once to cache the app. Afterwards, you can browse your library and
        play any songs you've imported while offline.
      </p>
    </main>
  </body>
</html>
